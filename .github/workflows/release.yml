name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-web.txt
          pip install pyinstaller

      - name: Create required directories
        shell: bash
        run: mkdir -p Models settings

      - name: Build with PyInstaller
        run: pyinstaller ssook.spec

      # ZIP portable
      - name: Package ZIP
        shell: pwsh
        run: Compress-Archive -Path dist/ssook -DestinationPath ssook-Windows-portable.zip

      # MSI installer via WiX
      - name: Install WiX Toolset
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.0.2
          wix extension add WixToolset.UI.wixext/5.0.2 -g

      - name: Generate WiX source
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          if ($version -notmatch '^\d+\.\d+\.\d+') { $version = "1.0.0" }
          @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs"
               xmlns:ui="http://wixtoolset.org/schemas/v4/wxs/ui">
            <Package Name="ssook"
                     Manufacturer="ssook"
                     Version="$version"
                     UpgradeCode="E8A3F1B2-4C5D-6E7F-8A9B-0C1D2E3F4A5B">
              <MajorUpgrade DowngradeErrorMessage="A newer version is already installed." />
              <MediaTemplate EmbedCab="yes" />
              <StandardDirectory Id="ProgramFiles6432Folder">
                <Directory Id="INSTALLFOLDER" Name="ssook">
                  <Component Id="MainExe" Guid="*">
                    <File Source="dist\ssook\ssook.exe" KeyPath="yes" />
                  </Component>
                </Directory>
              </StandardDirectory>
              <ComponentGroupRef Id="HarvestedFiles" />
              <Feature Id="Complete" Level="1">
                <ComponentRef Id="MainExe" />
                <ComponentGroupRef Id="HarvestedFiles" />
              </Feature>
              <ui:WixUI Id="WixUI_InstallDir" InstallDirectory="INSTALLFOLDER" />
            </Package>
          </Wix>
          "@ | Out-File -Encoding utf8 installer.wxs

      - name: Harvest files & build MSI
        shell: pwsh
        run: |
          wix build installer.wxs `
            -ext WixToolset.UI.wixext `
            -bindpath dist/ssook `
            -o ssook-Windows.msi
        continue-on-error: true

      - name: Fallback if MSI failed
        if: ${{ !hashFiles('ssook-Windows.msi') }}
        shell: pwsh
        run: |
          if (-not (Test-Path "ssook-Windows.msi")) {
            echo "MSI build skipped — ZIP only"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            ssook-Windows-portable.zip
            ssook-Windows.msi

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-web.txt
          pip install pyinstaller

      - name: Create required directories
        run: mkdir -p Models settings

      - name: Build with PyInstaller
        run: pyinstaller ssook_mac.spec

      # DMG
      - name: Create DMG
        run: |
          mkdir -p dmg_staging
          cp -R dist/ssook.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "ssook" -srcfolder dmg_staging \
            -ov -format UDZO ssook-macOS.dmg

      # ZIP fallback
      - name: Package ZIP
        run: cd dist && zip -r ../ssook-macOS.zip ssook.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            ssook-macOS.dmg
            ssook-macOS.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-build/ssook-Windows-portable.zip
            artifacts/windows-build/ssook-Windows.msi
            artifacts/macos-build/ssook-macOS.dmg
            artifacts/macos-build/ssook-macOS.zip
          generate_release_notes: true
          fail_on_unmatched_files: false

name: Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  QT_QPA_PLATFORM: offscreen

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build with PyInstaller
        run: pyinstaller visualizer.spec
      - name: Package
        run: Compress-Archive -Path dist/Visualizer -DestinationPath AIBench-AIO-Windows.zip
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: AIBench-AIO-Windows.zip

  build-macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build with PyInstaller
        run: pyinstaller visualizer_mac.spec
      - name: Package
        run: cd dist && zip -r ../AIBench-AIO-macOS.zip Visualizer.app || zip -r ../AIBench-AIO-macOS.zip Visualizer
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: AIBench-AIO-macOS.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-build/AIBench-AIO-Windows.zip
            artifacts/macos-build/AIBench-AIO-macOS.zip
          generate_release_notes: true

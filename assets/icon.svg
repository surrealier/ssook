<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0f1a2e"/>
    </linearGradient>
    <linearGradient id="vg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4dd8ff"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background rounded rect -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="#2a3f5f" stroke-width="2"/>
  <!-- V shape - left stroke -->
  <path d="M148 140 L248 370" stroke="url(#vg)" stroke-width="36" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  <!-- V shape - right stroke -->
  <path d="M364 140 L264 370" stroke="url(#vg)" stroke-width="36" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  <!-- Center bottom circle -->
  <circle cx="256" cy="380" r="14" fill="#4dd8ff" filter="url(#glow)"/>
  <!-- Top dots (data points) -->
  <circle cx="180" cy="110" r="10" fill="#4dd8ff" opacity="0.9" filter="url(#glow)"/>
  <circle cx="256" cy="90" r="10" fill="#4dd8ff" opacity="0.9" filter="url(#glow)"/>
  <circle cx="332" cy="110" r="10" fill="#4dd8ff" opacity="0.9" filter="url(#glow)"/>
  <!-- Subtle inner V highlight -->
  <path d="M168 150 L252 358" stroke="#80e8ff" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M344 150 L260 358" stroke="#80e8ff" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.4"/>
</svg>
